version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       vendorwatch
      POSTGRES_USER:     vendorwatch
      POSTGRES_PASSWORD: vendorwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorwatch -d vendorwatch"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ── Schema migrations ────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    environment:
      DATABASE_URL: postgresql://vendorwatch:vendorwatch@postgres:5432/vendorwatch
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Synthetic data (runs once on first startup) ──────────────────────────
  data-generator:
    build:
      context: .
      dockerfile: docker/data_generator/Dockerfile
    environment:
      DATABASE_URL: postgresql://vendorwatch:vendorwatch@postgres:5432/vendorwatch
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

